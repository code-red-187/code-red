<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F3;
    --surface:#FFFFFF;
    --ink:#2B2320;
    --muted:#8A7F76;
    --hairline:#E6DFD8;
    --wine:#7A2E3A;
    --wine-soft:#F3E3E3;
    --rose:#E3B6BA;
    --sage:#8B9A7A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:32px 20px 60px;
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .month-nav{ display:flex; align-items:center; gap:14px; }
  .month-nav button{
    background:none;
    color:var(--ink);
    font-size:18px;
    width:28px;height:28px;
    border-radius:50%;
    border:none;
    cursor:pointer;
  }
  .month-nav button:hover{ background:var(--wine-soft); }
  .month-title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:22px;
    min-width:150px;
    text-align:center;
  }
  .app-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    text-align:center;
    color:var(--wine);
    margin:0 0 20px;
    letter-spacing:0.5px;
  }
  .countdown-banner{
    text-align:center;
    font-size:13px;
    font-weight:500;
    padding:10px 14px;
    border-radius:10px;
    margin-bottom:20px;
    background:var(--wine-soft);
    color:var(--wine);
  }
  .countdown-banner.active{
    background:var(--wine);
    color:#fff;
  }
  .ring-wrap{ position:relative; width:64px; height:64px; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:var(--hairline); stroke-width:4; }
  .ring-progress{ fill:none; stroke:var(--wine); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .4s ease; }
  .ring-label{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:500;
  }
  .ring-caption{
    text-align:center;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--muted);
    margin-top:4px;
  }
  .phase-note{
    font-size:12px;
    color:var(--muted);
    text-align:center;
    margin-bottom:22px;
    white-space:pre-line;
  }
  .weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:6px;
  }
  .weekdays span{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    font-weight:500;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .day{
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:13px;
    color:var(--ink);
  }
  .day.empty{ visibility:hidden; }
  .day.period{
    background:var(--wine);
    color:#fff;
    font-weight:500;
  }
  .day.predicted{
    border:1.5px dashed var(--rose);
    color:var(--wine);
  }
  .day.today:not(.period){
    box-shadow:0 0 0 1.5px var(--sage) inset;
  }
  .legend{
    display:flex;
    gap:18px;
    justify-content:center;
    margin-top:24px;
    font-size:12px;
    color:var(--muted);
  }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot.period{ background:var(--wine); }
  .dot.predicted{ border:1.5px dashed var(--rose); }
  .empty-state{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    margin-top:80px;
  }
  .request-card{
    margin-top:28px;
    border-top:1px solid var(--hairline);
    padding-top:20px;
    text-align:center;
  }
  .request-toggle{
    background:var(--wine);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:11px 20px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .request-form{
    display:none;
    margin-top:14px;
    text-align:left;
  }
  .request-form label{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.5px;
    display:block;
    margin-bottom:4px;
  }
  .request-form input{
    width:100%;
    padding:10px 12px;
    margin-bottom:12px;
    border:1px solid var(--hairline);
    border-radius:10px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    background:var(--surface);
    color:var(--ink);
  }
  .request-form input:focus{ outline:none; border-color:var(--wine); }
  .request-submit{
    width:100%;
    padding:12px;
    background:var(--wine);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .request-sent{
    font-size:13px;
    color:var(--sage);
    margin-top:10px;
    text-align:center;
  }
</style>
</head>
<body>

<div class="wrap">
  <div id="loading" class="empty-state">Loading…</div>

  <div id="content" style="display:none;">
    <h1 class="app-title">Code Red</h1>
    <div class="countdown-banner" id="countdown-banner">–</div>

    <div class="header">
      <div class="month-nav">
        <button id="prev-month">‹</button>
        <div class="month-title" id="month-title">—</div>
        <button id="next-month">›</button>
      </div>
      <div>
        <div class="ring-wrap">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="ring-track" cx="32" cy="32" r="27"></circle>
            <circle class="ring-progress" id="ring-progress" cx="32" cy="32" r="27" stroke-dasharray="169.6" stroke-dashoffset="169.6"></circle>
          </svg>
          <div class="ring-label" id="ring-label">–</div>
        </div>
        <div class="ring-caption">cycle day</div>
      </div>
    </div>
    <p class="phase-note" id="phase-note"></p>

    <div class="weekdays">
      <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
    </div>
    <div class="grid" id="calendar-grid"></div>

    <div class="legend">
      <span><i class="dot period"></i>Logged</span>
      <span><i class="dot predicted"></i>Predicted</span>
    </div>

    <div class="request-card">
      <button class="request-toggle" id="request-toggle">Send a fuck request 😏</button>
      <div class="request-form" id="request-form">
        <label>Name</label>
        <input type="text" id="req-name" placeholder="who's asking">
        <label>Date</label>
        <input type="date" id="req-date">
        <label>Time</label>
        <input type="time" id="req-time">
        <label>Place</label>
        <input type="text" id="req-place" placeholder="where">
        <label>Note (optional)</label>
        <input type="text" id="req-note" placeholder="anything you want to add">
        <button class="request-submit" id="request-submit">Send request</button>
      </div>
      <p class="request-sent" id="request-sent" style="display:none;">Fuck request sent 😏</p>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyD9DHCUde4F51K2hau861CsM74D0bvdSg4",
  authDomain: "hallo-86b8b.firebaseapp.com",
  projectId: "hallo-86b8b",
  storageBucket: "hallo-86b8b.firebasestorage.app",
  messagingSenderId: "601710514911",
  appId: "1:601710514911:web:d133f9a75d4e3a30dc0f6a"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const shareId = params.get('id');

let periodDays = new Set();
let current = new Date();
current.setDate(1);

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function estimateCycle() {
  const sorted = Array.from(periodDays).sort();
  const starts = [];
  const segments = [];
  let segStart = null, segLen = 0;
  for (let i = 0; i < sorted.length; i++) {
    const prev = sorted[i-1];
    const gap = prev ? (new Date(sorted[i]) - new Date(prev)) / 86400000 : null;
    if (!prev || gap > 1) {
      if (segStart) segments.push(segLen);
      starts.push(sorted[i]);
      segStart = sorted[i];
      segLen = 1;
    } else {
      segLen++;
    }
  }
  if (segStart) segments.push(segLen);

  const periodLength = segments.length
    ? Math.round(segments.reduce((a,b) => a+b, 0) / segments.length)
    : 5;

  if (starts.length < 2) return { avgLength: 28, lastStart: starts[0] || null, periodLength };
  let total = 0;
  for (let i = 1; i < starts.length; i++) {
    total += (new Date(starts[i]) - new Date(starts[i-1])) / 86400000;
  }
  return { avgLength: Math.round(total / (starts.length - 1)), lastStart: starts[starts.length-1], periodLength };
}

function predictedDays(avgLength, lastStart, periodLength) {
  if (!lastStart) return new Set();
  const next = new Set();
  for (let cycle = 1; cycle <= 3; cycle++) {
    const start = new Date(lastStart);
    start.setDate(start.getDate() + avgLength * cycle);
    for (let i = 0; i < periodLength; i++) {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      next.add(fmt(d));
    }
  }
  return next;
}

const PHASE_LINES = {
  Menstrual: "HEUTE: Alarmstufe Rot. Schokolade und Abstand halten. Du kannst kuscheln kommen oder dich nächste Woche melden",
  Follicular: "HEUTE: Aufbauphase. Vorsichtiger Optimismus kehrt zurück.",
  Ovulation: "HEUTE: Höchste Chaos-Energie. Sei gewarnt. Possibly fickrig..",
  Luteal: "HEUTE: Der Sturm zieht auf. Rette sich, wer kann."
};
const PHASE_NAMES_DE = {
  Menstrual: "Menstruation",
  Follicular: "Follikelphase",
  Ovulation: "Eisprung",
  Luteal: "Lutealphase"
};

function render() {
  document.getElementById('month-title').textContent = MONTHS[current.getMonth()] + ' ' + current.getFullYear();

  const { avgLength, lastStart, periodLength } = estimateCycle();
  const predicted = predictedDays(avgLength, lastStart, periodLength);

  const ring = document.getElementById('ring-progress');
  const label = document.getElementById('ring-label');
  const note = document.getElementById('phase-note');
  const banner = document.getElementById('countdown-banner');
  const circumference = 169.6;
  if (lastStart) {
    const dayOfCycle = Math.max(1, Math.round((new Date() - new Date(lastStart)) / 86400000) + 1);
    const clamped = Math.min(dayOfCycle, avgLength);
    const pct = clamped / avgLength;
    ring.style.strokeDashoffset = circumference * (1 - pct);
    label.textContent = dayOfCycle + '/' + avgLength;
    let phase = 'Follicular';
    if (dayOfCycle <= 5) phase = 'Menstrual';
    else if (dayOfCycle >= avgLength - 16 && dayOfCycle <= avgLength - 12) phase = 'Ovulation';
    else if (dayOfCycle > avgLength - 12) phase = 'Luteal';
    note.textContent = PHASE_LINES[phase] + ' (' + PHASE_NAMES_DE[phase] + ', Tag ' + dayOfCycle + ')';

    if (dayOfCycle <= periodLength) {
      banner.textContent = '🚨 Code Red ist aktiv 🚨';
      banner.classList.add('active');
    } else {
      const daysUntil = avgLength - dayOfCycle;
      banner.classList.remove('active');
      if (daysUntil > 0) {
        banner.textContent = 'Noch ' + daysUntil + ' Tag' + (daysUntil === 1 ? '' : 'e') + ' bis Code Red';
      } else {
        banner.textContent = 'Code Red überfällig um ' + Math.abs(daysUntil) + ' Tag' + (Math.abs(daysUntil) === 1 ? '' : 'e');
      }
    }
  } else {
    ring.style.strokeDashoffset = circumference;
    label.textContent = '–';
    note.textContent = 'Nothing logged yet.';
    banner.textContent = 'No data yet';
    banner.classList.remove('active');
  }

  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  const year = current.getFullYear();
  const month = current.getMonth();
  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = fmt(new Date());

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(year, month, d);
    const key = fmt(cellDate);
    const cell = document.createElement('div');
    cell.className = 'day';
    if (periodDays.has(key)) cell.classList.add('period');
    else if (predicted.has(key)) cell.classList.add('predicted');
    if (key === todayStr) cell.classList.add('today');
    cell.textContent = d;
    grid.appendChild(cell);
  }
}

document.getElementById('prev-month').onclick = () => { current.setMonth(current.getMonth() - 1); render(); };
document.getElementById('next-month').onclick = () => { current.setMonth(current.getMonth() + 1); render(); };

document.getElementById('request-toggle').onclick = () => {
  const form = document.getElementById('request-form');
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
};

// prevent picking a date in the past
document.getElementById('req-date').min = fmt(new Date());

document.getElementById('request-submit').onclick = async () => {
  const name = document.getElementById('req-name').value.trim();
  const date = document.getElementById('req-date').value;
  const time = document.getElementById('req-time').value;
  const place = document.getElementById('req-place').value.trim();
  const note = document.getElementById('req-note').value.trim();
  if (!name) { alert('Add a name first.'); return; }
  if (!date) { alert('Pick a date first.'); return; }
  if (date < fmt(new Date())) { alert('Pick a date that isn\'t in the past.'); return; }
  if (!shareId) return;
  await addDoc(collection(db, 'requests', shareId, 'items'), {
    name, date, time, place, note, createdAt: serverTimestamp()
  });
  document.getElementById('request-form').style.display = 'none';
  document.getElementById('request-toggle').style.display = 'none';
  document.getElementById('request-sent').style.display = 'block';
};

if (!shareId) {
  document.getElementById('loading').textContent = "This link is missing its id — ask for the correct link.";
} else {
  onSnapshot(doc(db, 'public', shareId), (snap) => {
    periodDays = new Set(snap.exists() ? (snap.data().periodDays || []) : []);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();
  });
}
</script>

</body>
</html>
